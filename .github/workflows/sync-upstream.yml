name: Sync Upstream New-API

on:
  schedule:
    - cron: '7 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

jobs:
  sync_upstream:
    if: github.repository == 'tanranv5/new-api'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      sync_sha: ${{ steps.sync.outputs.sync_sha }}
      sync_short_sha: ${{ steps.sync.outputs.sync_short_sha }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/QuantumNous/new-api.git
          else
            git remote add upstream https://github.com/QuantumNous/new-api.git
          fi

      - name: Sync upstream main into fork main
        id: sync
        run: |
          git fetch upstream main
          git merge --no-edit -X theirs upstream/main
          git push origin HEAD:main
          echo "sync_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sync_short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build_single_arch:
    if: github.repository == 'tanranv5/new-api'
    needs: sync_upstream
    name: Build & push (${{ matrix.arch }}) [GHCR]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - name: Check out synced main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:latest-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:sync-${{ needs.sync_upstream.outputs.sync_short_sha }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    if: github.repository == 'tanranv5/new-api'
    needs:
      - sync_upstream
      - build_single_arch
    name: Create multi-arch manifests (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 15
    steps:
      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (latest)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:latest \
            ghcr.io/${GHCR_REPOSITORY}:latest-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:latest-arm64

      - name: Create & push manifest (synced revision)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:sync-${{ needs.sync_upstream.outputs.sync_short_sha }} \
            ghcr.io/${GHCR_REPOSITORY}:sync-${{ needs.sync_upstream.outputs.sync_short_sha }}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:sync-${{ needs.sync_upstream.outputs.sync_short_sha }}-arm64
